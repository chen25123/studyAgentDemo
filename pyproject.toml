[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "llm: tests that require LLM API access (skip in CI)",
]
addopts = "-m \"not llm\" --ignore=tests/test_agent_eval.py"
